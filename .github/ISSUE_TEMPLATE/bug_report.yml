name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A short description of the bug.
      placeholder: The command failed when I tried to...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: I expected ...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
      placeholder: Instead, ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, deployment target, or any other useful context.
      placeholder: macOS 15, Python 3.12, Docker, etc.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any helpful output or screenshots.
      render: shell
